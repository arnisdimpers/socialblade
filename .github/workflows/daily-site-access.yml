name: Daily Site Access

on:
  schedule:
    # Run at 18:55 Japanese Time (09:55 UTC) every day
    - cron: "55 9 * * *"
  workflow_dispatch:

jobs:
  access-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure git has identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Access website
        run: |
          URL="https://arnisdimpers.github.io/socialblade/"
          MAX_RETRIES=12
          SLEEP=10
          revenue=""
          echo "Polling $URL for revenue value (max $MAX_RETRIES attempts)..."
          for attempt in $(seq 1 $MAX_RETRIES); do
            http_code=$(curl -s -w "%{http_code}" -o response.html "$URL")
            if [ "$http_code" -ne 200 ]; then
              echo "Attempt $attempt: HTTP $http_code - retrying in ${SLEEP}s..."
              sleep $SLEEP
              continue
            fi
            # extract the content of <span id="todayEarned">VALUE</span>
            revenue=$(perl -0777 -ne 'print $1 if /id="todayEarned">([^<]+)</s' response.html)
            echo "Attempt $attempt: extracted revenue='$revenue'"
            if [ -n "$revenue" ] && [ "$revenue" != "..." ] && [ "$revenue" != "(none)" ]; then
              echo "Found revenue on attempt $attempt: $revenue"
              break
            fi
            sleep $SLEEP
          done
          # Determine pass/fail based on extracted revenue
          checkpassed=false
          if [ -n "$revenue" ] && [ "$revenue" != "..." ] && [ "$revenue" != "(none)" ]; then
            checkpassed=true
          fi
          echo "checkpassed=$checkpassed"

          # Write the boolean into Firebase Realtime Database at /history/checkpassed
          # Replace the DATABASE_URL below if your DB URL differs. This uses public write access.
          DATABASE_URL="https://socialblade-8690c-default-rtdb.firebaseio.com"
          # Use the REST API to PUT the boolean
          echo "$checkpassed" | tr '[:upper:]' '[:lower:]' > /tmp/checkval.txt
          http_code=$(curl -s -o /dev/null -w "%{http_code}" -X PUT -H "Content-Type: application/json" --data-binary @/tmp/checkval.txt "$DATABASE_URL/history/checkpassed.json")
          echo "Firebase REST write returned HTTP $http_code"
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Wrote checkpassed=$checkpassed to Firebase"
          else
            echo "Failed to write to Firebase (HTTP $http_code)"
            exit 1
          fi
