name: Daily Site Access

on:
  schedule:
    # Run at 00:01 Japanese Time (15:01 UTC previous day) every day
    - cron: "1 15 * * *"
  workflow_dispatch:

jobs:
  access-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure git has identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Load site 4 times and wait for completion
        run: |
          set -euo pipefail
          URL="https://arnisdimpers.github.io/socialblade/"
          ITER=4

          # install Playwright locally (no apt usage)
          npm install --no-audit --no-fund playwright@1.38.0
          # download Playwright browsers
          npx playwright install

          for i in $(seq 1 $ITER); do
            echo "--- Playwright visit $i of $ITER ---"
            # run the playwright script (it will exit non-zero if page didn't indicate ready)
            node .github/scripts/playwright-run.js "$URL" 15 1

            # record the successful visit to Firebase Realtime Database via REST API
            DATABASE_URL="https://socialblade-8690c-default-rtdb.firebaseio.com"
            ISO_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            MS_TS=$(($(date +%s) * 1000))
            echo "Recording visit $i at $ISO_TS to Firebase"
            curl -s -X PUT -H "Content-Type: application/json" -d "\"${ISO_TS}\"" "$DATABASE_URL/history/lastRun.json" || true
            curl -s -X PUT -H "Content-Type: application/json" -d "{\"visit\":${i},\"status\":\"success\",\"ts\":${MS_TS}}" "$DATABASE_URL/history/runs/${MS_TS}.json" || true

            sleep 1
          done
